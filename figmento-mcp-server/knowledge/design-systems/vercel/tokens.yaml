mood:
  - technical
  - precise
  - achromatic
voice: >-
  Extreme typographic precision through aggressive negative letter-spacing.
  Shadow-as-border technique replaces traditional borders. Achromatic palette
  with workflow-specific accent colors. Developer-first, deployment-oriented.
