voice: >-
  Warm neutrals (never cold grays) with a singular Notion Blue accent. Custom
  modified Inter with aggressive negative tracking at display sizes. Multi-layer
  shadow stacks at sub-0.05 opacity create whisper-soft elevation. Ultra-thin
  borders at rgba(0,0,0,0.1).
